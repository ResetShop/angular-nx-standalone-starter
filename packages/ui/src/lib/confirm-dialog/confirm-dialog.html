<dialog
	(cancel)="onDialogCancel($event)"
	[attr.aria-labelledby]="title() ? titleId : null"
	[attr.aria-describedby]="message() ? messageId : null"
	role="alertdialog"
	#dialogRef
	class="confirm-dialog m-auto rounded-lg bg-white p-0 shadow-xl dark:bg-gray-900"
>
	<div data-testid="confirm-dialog-content" class="w-[calc(100%-2rem)] max-w-md p-4 sm:w-full sm:p-6">
		@if (title()) {
		<h2 [id]="titleId" class="text-lg font-semibold text-gray-900 dark:text-white">{{ title() }}</h2>
		} @if (message()) {
		<p [id]="messageId" class="mt-2 text-sm text-gray-500 dark:text-gray-400">{{ message() }}</p>
		}

		<div class="mt-6 flex justify-end gap-3">
			<button (click)="onCancel()" appButton variant="secondary">{{ cancelText() }}</button>
			<button (click)="onConfirm()" [variant]="confirmVariant()" appButton>{{ confirmText() }}</button>
		</div>
	</div>
</dialog>
