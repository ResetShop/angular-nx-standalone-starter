name: Prepare Release PR (develop → main)

# Creates or updates the develop → main release PR when a release-prep PR
# (a PR closing an issue labeled `🚀 release`) merges into develop. Never
# merges to main — it only documents and opens the PR; a maintainer merges it,
# which is what triggers release.yml (tag + GitHub Release).
#
# Triggers:
#   - pull_request closed → develop (gate: merged + closes a 🚀 release issue)
#   - workflow_dispatch (version optional; force skips the milestone check;
#     dry_run resolves and logs everything but creates/updates nothing)

on:
  pull_request:
    types: [closed]
    branches: [develop]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (default: the one in package.json on develop)'
        required: false
        type: string
      force:
        description: 'Skip the milestone-complete check'
        type: boolean
        default: false
      dry_run:
        description: 'Resolve and log only — do not create/update the PR or dispatch CI'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  issues: read
  actions: write # dispatch ci.yml against develop via workflow_dispatch

concurrency:
  group: prepare-release-pr
  cancel-in-progress: false

jobs:
  prepare:
    name: Create release PR
    runs-on: ubuntu-latest
    # Upstream-only (same full owner/repo gate as upstream-guards.yml — forks
    # keep their own release conventions). On PR events, only when the PR
    # actually merged (not on close-without-merge) and does NOT come from a
    # fork: pull_request events from fork PRs carry a read-only GITHUB_TOKEN,
    # so `gh pr create`/`gh workflow run` would 403 without an obvious cause.
    if: >-
      github.repository == 'ResetShop/angular-nx-standalone-starter' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.pull_request.merged == true && github.event.pull_request.head.repo.fork != true))

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4.2.2
        with:
          ref: develop

      - name: Resolve version, release issue, and flags
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          force=false
          release_issue=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            # Gate: the merged PR must close an issue labeled `🚀 release`.
            # This fires on every merge into develop by design — for ordinary
            # feature PRs it exits here as a cheap no-op.
            refs=$(gh pr view "$PR_NUMBER" --json closingIssuesReferences \
              --jq '.closingIssuesReferences[].number')
            if [ -z "${refs//[[:space:]]/}" ]; then
              echo "PR #$PR_NUMBER closes no issues (no 'Closes #N' keyword). Skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            for n in $refs; do
              if gh issue view "$n" --json labels --jq '.labels[].name' | grep -qx '🚀 release'; then
                release_issue=$n
                break
              fi
            done
            if [ -z "$release_issue" ]; then
              echo "No issue closed by PR #$PR_NUMBER carries the 🚀 release label. Skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            version=$(jq -r .version package.json)
            echo "Release-prep PR detected (issue #$release_issue). Version: $version"
          else
            if [ -n "${INPUT_VERSION:-}" ]; then
              version="$INPUT_VERSION"
            else
              version=$(jq -r .version package.json)
            fi
            if [ "${INPUT_FORCE:-false}" = "true" ]; then
              force=true
            fi
            # The milestone's issue labeled 🚀 release (open or closed).
            release_issue=$(gh issue list --milestone "$version" --label "🚀 release" --state all \
              --json number --jq '.[0].number // empty' || true)
            echo "workflow_dispatch: version=$version force=$force release_issue=${release_issue:-none}"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_issue=$release_issue" >> "$GITHUB_OUTPUT"
          echo "force=$force" >> "$GITHUB_OUTPUT"

      - name: Check milestone completeness
        id: milestone
        if: steps.resolve.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.resolve.outputs.version }}
          RELEASE_ISSUE: ${{ steps.resolve.outputs.release_issue }}
          FORCE: ${{ steps.resolve.outputs.force }}
        run: |
          set -euo pipefail
          if [ "$FORCE" = "true" ]; then
            echo "force=true: milestone check skipped."
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exclude="${RELEASE_ISSUE:-}"
          if [ -z "$exclude" ]; then
            open=$(gh issue list --milestone "$VERSION" --state open --json number --jq 'length')
          else
            open=$(gh issue list --milestone "$VERSION" --state open --json number \
              --jq "[.[] | select(.number != $exclude)] | length")
          fi
          if [ "$open" != "0" ]; then
            echo "::warning::Milestone $VERSION still has $open open issue(s) besides the release issue. Release PR not created. Re-trigger via workflow_dispatch with force=true if appropriate."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Milestone $VERSION complete (except the release issue). Proceeding."
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Build PR body
        id: body
        if: steps.resolve.outputs.skip != 'true' && steps.milestone.outputs.ready == 'true'
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          body_file="${RUNNER_TEMP}/release-pr-body.md"
          {
            echo "## Manual steps"
            echo ""
            echo "- [ ] Merge this PR into \`main\` → triggers \`release.yml\` (tag \`v${VERSION}\` + GitHub Release from the CHANGELOG section)."
            echo "- [ ] Verify the Release workflow is green and the production app is healthy (\`/api/health/v1\`). Railway deploys \`main\` via its native Git integration."
            echo ""
            # The release and its notes are published by release.yml on merge to
            # main, so this link resolves only after the merge (404 until then).
            echo "Version changelog: https://github.com/${REPO}/releases/tag/v${VERSION}"
          } > "$body_file"

          echo "body_file=$body_file" >> "$GITHUB_OUTPUT"
          echo "title=Release v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create or update PR develop → main
        if: steps.resolve.outputs.skip != 'true' && steps.milestone.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ steps.body.outputs.title }}
          BODY_FILE: ${{ steps.body.outputs.body_file }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "dry_run=true: would create/update the develop → main PR titled '$TITLE' with body:"
            cat "$BODY_FILE"
            exit 0
          fi
          existing=$(gh pr list --base main --head develop --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Updating existing PR #$existing"
            gh pr edit "$existing" --title "$TITLE" --body-file "$BODY_FILE"
            echo "PR updated: $(gh pr view "$existing" --json url --jq .url)"
          else
            url=$(gh pr create --base main --head develop --title "$TITLE" --body-file "$BODY_FILE")
            echo "PR created: $url"
          fi

      - name: Dispatch CI against develop
        # The develop → main PR is created by GITHUB_TOKEN, which by GitHub's
        # anti-recursion rule does not fire ci.yml's `on: pull_request`. CI is
        # dispatched explicitly against develop instead (workflow_dispatch is
        # the exception the token CAN trigger) so the release has CI signal
        # for exactly what ships.
        if: steps.resolve.outputs.skip != 'true' && steps.milestone.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "dry_run=true: would dispatch ci.yml against develop."
            exit 0
          fi
          gh workflow run ci.yml --ref develop
          echo "CI (ci.yml) dispatched against develop."
