name: Release (tag + GitHub Release)

# Creates the vX.Y.Z tag and publishes the GitHub Release with the version's
# CHANGELOG.md section as curated notes when develop → main merges with a
# bumped package.json version. Pushes to main without a version bump are
# no-ops (tag-existence check). App deployment is NOT handled here — Railway
# deploys main via its native Git integration (railway.json).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Resolve the version and extract the notes, but do not create the tag/release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Create tag and GitHub Release
    runs-on: ubuntu-latest
    # Upstream-only: forks keep their own release conventions (same gate as
    # upstream-guards.yml).
    if: github.repository == 'ResetShop/angular-nx-standalone-starter'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Read version from package.json
        id: version
        run: |
          set -euo pipefail
          version=$(jq -r .version package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Check whether the tag already exists (idempotency)
        id: check-tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # ls-remote with an exact refspec returns the tag only on an exact
          # match (no prefix matching), so a non-empty result means it exists.
          if [ -n "$(git ls-remote --tags origin "refs/tags/v${VERSION}")" ]; then
            echo "Tag v${VERSION} already exists — no version bump in this push, nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v${VERSION} does not exist. Proceeding with the release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract notes from CHANGELOG.md
        id: notes
        if: steps.check-tag.outputs.should_release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Literal-match awk (index, not regex) so version dots are not
          # metacharacters. Prints the body between `## [<version>]` and the
          # next `## [` heading. `## [Unreleased]` always sits above the
          # version sections, so the exit condition never matches it first.
          # Failing on an empty result forces every version bump to ship with
          # its CHANGELOG section.
          notes=$(awk -v ver="$VERSION" '
            BEGIN { header = "## [" ver "]" }
            index($0, header) == 1 { found = 1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "${notes//[[:space:]]/}" ]; then
            echo "::error::No '## [${VERSION}]' section found in CHANGELOG.md. Promote the Unreleased section before merging to main." >&2
            exit 1
          fi
          # Temp file avoids quoting issues when passing the notes to
          # gh release create.
          echo "$notes" > "${RUNNER_TEMP}/release-notes.md"
          echo "notes_file=${RUNNER_TEMP}/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create tag and publish GitHub Release
        if: steps.check-tag.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "dry_run=true: would create release v${VERSION} with these notes:"
            cat "$NOTES_FILE"
            exit 0
          fi
          echo "::group::Creating release v${VERSION}"
          # --notes-file (curated CHANGELOG prose) is prepended to the PR list
          # that --generate-notes produces since the previous tag. The heading
          # of that list ("Merged PRs") is configured in .github/release.yml.
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "$NOTES_FILE" \
            --generate-notes \
            --target main
          echo "::endgroup::"
          echo "Release v${VERSION} published."
