name: CI

on:
  pull_request:

jobs:
  setup:
    name: 'Setup and dependencies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.12
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4.2.3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Rebuild and prepare
        run: npm rebuild && npm run prepare --if-present
        env:
          PG_CONNECTION_STRING: ${{ secrets.PG_CONNECTION_STRING }}

      - name: Generate testing environment file
        run: npm run config
        env:
          PG_CONNECTION_STRING: ${{ secrets.PG_CONNECTION_STRING }}

      - name: Cache repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.12
          cache: 'npm'

      - name: Run Tests
        run: npx nx test --skip-nx-cache

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.12
          cache: 'npm'

      - name: Run Linter
        run: npx nx lint --skip-nx-cache

  stylelint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.12
          cache: 'npm'

      - name: Run stylelint
        run: npx nx stylelint app --skip-nx-cache

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.12
          cache: 'npm'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate PASETO key for CI
        run: echo "PASETO_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run Tests
        run: npx nx run app:e2e --skip-nx-cache

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: dist/.playwright/playwright-report/
          retention-days: 7

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.12
          cache: 'npm'

      - name: Generate PASETO key for CI
        run: echo "PASETO_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run build
        run: npx nx run app:build:production --skip-nx-cache

  storybook:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.12
          cache: 'npm'

      - name: Run Storybook build
        run: npx nx run app:build-storybook --skip-nx-cache
