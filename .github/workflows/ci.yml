name: CI

on:
  pull_request:
  # Push to develop: runs CI on every merge and, above all, saves the Nx cache
  # on the default branch — restorable by every PR from its first push.
  push:
    branches: [develop]
  # Manual runs, and the release pipeline's CI signal: the develop → main
  # release PR is created by GITHUB_TOKEN, which by GitHub's anti-recursion
  # rule does not fire `on: pull_request`; `workflow_dispatch` is the
  # exception the token CAN trigger, so prepare-release-pr.yml dispatches
  # this workflow against develop to get real status for what ships.
  workflow_dispatch:

# This workspace does not use Nx Cloud — no nxCloudId in nx.json, no token
# referenced anywhere in this workflow. NX_NO_CLOUD is set defensively so a
# stray NX_CLOUD_ACCESS_TOKEN in the runner environment can never activate it.
env:
  NX_NO_CLOUD: 'true'

jobs:
  setup:
    name: 'Setup and dependencies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      - name: Get Node.js version
        id: node-version
        run: echo "version=$(node -v)" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4.2.3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ steps.node-version.outputs.version }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts # Lifecycle scripts run separately via npm rebuild and npm run prepare below

      - name: Rebuild and prepare
        run: npm rebuild && npm run prepare --if-present
        env:
          PG_CONNECTION_STRING: ${{ secrets.PG_CONNECTION_STRING }}

      - name: Cache repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      - name: Run Tests
        run: npx nx run-many -t test

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      - name: Run typecheck
        run: npx nx run-many -t typecheck

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      - name: Run Linter
        run: npx nx run-many -t lint

  stylelint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      - name: Run stylelint
        run: npx nx stylelint reference-app

  check:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      # Repo-wide guards (no `.env*` files, no issue refs in code comments, prettier formatting).
      # The `check` target is `cache: false`, so it always runs — closing the gap where a
      # `--no-verify` push would otherwise skip the pre-commit guards entirely.
      - name: Run repo-wide guards
        run: npx nx run @app/source:check

  test-integration:
    needs: setup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      - name: Run integration tests
        run: npx nx test-integration reference-app --skip-nx-cache
        env:
          # PG_TEST_CONNECTION_STRING is a repo Variable — it points at the in-job
          # postgres:17 service container above (localhost, no real credential).
          # INTEGRATION_TEST_ADMIN_PASSWORD is a repo Secret, so it is masked in logs.
          # Set both in repo Settings → Secrets and variables → Actions.
          PG_TEST_CONNECTION_STRING: ${{ vars.PG_TEST_CONNECTION_STRING }}
          INTEGRATION_TEST_ADMIN_PASSWORD: ${{ secrets.INTEGRATION_TEST_ADMIN_PASSWORD }}

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate PASETO key for CI
        run: echo "PASETO_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run Tests
        run: npx nx run reference-app:e2e --skip-nx-cache
        env:
          # The Playwright globalSetup seeds this postgres:17 service (same pattern as test-integration).
          # PG_TEST_CONNECTION_STRING is a repo Variable (localhost service, no real credential);
          # INTEGRATION_TEST_ADMIN_PASSWORD is a repo Secret, so it is masked in logs.
          PG_TEST_CONNECTION_STRING: ${{ vars.PG_TEST_CONNECTION_STRING }}
          INTEGRATION_TEST_ADMIN_PASSWORD: ${{ secrets.INTEGRATION_TEST_ADMIN_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: dist/.playwright/playwright-report/
          retention-days: 7

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      - name: Generate PASETO key for CI
        run: echo "PASETO_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run build
        run: npx nx run reference-app:build:production

  storybook:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24.18'

      - name: Run Storybook build
        run: npx nx run reference-app:build-storybook
