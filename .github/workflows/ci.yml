name: CI

on:
  pull_request:

jobs:
  setup:
    name: 'Setup and dependencies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Get Node.js version
        id: node-version
        run: echo "version=$(node -v)" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4.2.3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ steps.node-version.outputs.version }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts # Lifecycle scripts run separately via npm rebuild and npm run prepare below

      - name: Rebuild and prepare
        run: npm rebuild && npm run prepare --if-present
        env:
          PG_CONNECTION_STRING: ${{ secrets.PG_CONNECTION_STRING }}

      - name: Cache repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

  tsx-smoke:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Run tsx alias-resolution smoke test
        run: npm run ci:tsx-smoke

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Run Tests
        run: npm run test

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Run typecheck
        run: npm run typecheck

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Run Linter
        run: npm run lint

  stylelint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Run stylelint
        run: npm run stylelint

  test-integration:
    needs: setup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Run integration tests
        run: npm run test:integration
        env:
          PG_TEST_CONNECTION_STRING: ${{ secrets.PG_TEST_CONNECTION_STRING }}
          INTEGRATION_TEST_ADMIN_PASSWORD: ${{ secrets.INTEGRATION_TEST_ADMIN_PASSWORD }}

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate PASETO key for CI
        run: echo "PASETO_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run Tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: dist/.playwright/playwright-report/
          retention-days: 7

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Generate PASETO key for CI
        run: echo "PASETO_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run build
        run: npm run build

  storybook:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}
          restore-keys: |
            repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.20

      - name: Run Storybook build
        run: npm run storybook:build
