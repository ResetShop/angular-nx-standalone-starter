name: CI

on:
  pull_request:

# Inherited by every job so Nx tasks can read/write the Nx Cloud remote cache.
# The cacheable jobs below drop `--skip-nx-cache`; `e2e` stays cold by design.
env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  setup:
    name: 'Setup and dependencies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.20'

      - name: Get Node.js version
        id: node-version
        run: echo "version=$(node -v)" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4.2.3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ steps.node-version.outputs.version }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts # Lifecycle scripts run separately via npm rebuild and npm run prepare below

      - name: Rebuild and prepare
        run: npm rebuild && npm run prepare --if-present
        env:
          PG_CONNECTION_STRING: ${{ secrets.PG_CONNECTION_STRING }}

      - name: Cache repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.20'

      - name: Run Tests
        run: bash .github/scripts/nx-run.sh nx run-many -t test

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.20'

      - name: Run typecheck
        run: bash .github/scripts/nx-run.sh nx run-many -t typecheck

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.20'

      - name: Run Linter
        run: bash .github/scripts/nx-run.sh nx run-many -t lint

  stylelint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.20'

      - name: Run stylelint
        run: bash .github/scripts/nx-run.sh nx stylelint reference-app

  test-integration:
    needs: setup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.20'

      - name: Run integration tests
        run: bash .github/scripts/nx-run.sh nx test-integration reference-app --skip-nx-cache
        env:
          # PG_TEST_CONNECTION_STRING is a repo Variable — it points at the in-job
          # postgres:17 service container above (localhost, no real credential).
          # INTEGRATION_TEST_ADMIN_PASSWORD is a repo Secret, so it is masked in logs.
          # Set both in repo Settings → Secrets and variables → Actions.
          PG_TEST_CONNECTION_STRING: ${{ vars.PG_TEST_CONNECTION_STRING }}
          INTEGRATION_TEST_ADMIN_PASSWORD: ${{ secrets.INTEGRATION_TEST_ADMIN_PASSWORD }}

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.20'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate PASETO key for CI
        run: echo "PASETO_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run Tests
        run: bash .github/scripts/nx-run.sh nx run reference-app:e2e --skip-nx-cache
        env:
          # The Playwright globalSetup seeds this postgres:17 service (same pattern as test-integration).
          # PG_TEST_CONNECTION_STRING is a repo Variable (localhost service, no real credential);
          # INTEGRATION_TEST_ADMIN_PASSWORD is a repo Secret, so it is masked in logs.
          PG_TEST_CONNECTION_STRING: ${{ vars.PG_TEST_CONNECTION_STRING }}
          INTEGRATION_TEST_ADMIN_PASSWORD: ${{ secrets.INTEGRATION_TEST_ADMIN_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: dist/.playwright/playwright-report/
          retention-days: 7

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.20'

      - name: Generate PASETO key for CI
        run: echo "PASETO_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Run build
        run: bash .github/scripts/nx-run.sh nx run reference-app:build:production

  storybook:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Restore repository
        uses: actions/cache@v4.2.3
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.20'

      - name: Run Storybook build
        run: bash .github/scripts/nx-run.sh nx run reference-app:build-storybook
