<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>app</title>
		<base href="/" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/x-icon" href="favicon.ico" />

		<!-- Font preloading to prevent flickering -->
		<link rel="preload" href="/fonts/geist-sans/Geist-Variable.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/geist-mono/GeistMono-Variable.woff2" as="font" type="font/woff2" crossorigin />

		<!-- Script to avoid flickering when the preferred theme is first loaded. Related to the features from Theme service -->
		<script>
			;(function () {
				const storedTheme = localStorage.getItem('theme-preference')
				let isDark = false
				if (storedTheme !== null) {
					isDark = storedTheme === 'dark'
				} else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
					isDark = true
				}
				if (isDark) {
					document.documentElement.classList.add('dark')
				}
			})()
		</script>
	</head>
	<body id="body">
		<app-root id="root"></app-root>
	</body>
</html>
